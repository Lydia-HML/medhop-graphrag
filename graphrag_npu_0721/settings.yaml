# GraphRAG 3.0.9 defaults to 25 concurrent LLM requests. Lemonade FLM/NPU is
# most stable with a single in-flight generation.
concurrent_requests: 1

completion_models:
  default_completion_model:
    type: litellm
    model_provider: openai
    model: qwen3-it-4b-FLM
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    api_base: http://127.0.0.1:13305/api/v1
    call_args:
      temperature: 0
      timeout: 300
    retry:
      type: exponential_backoff
      max_retries: 2
      base_delay: 5
      max_delay: 10
    rate_limit:
      type: sliding_window
      requests_per_period: 1
      period_in_seconds: 5

embedding_models:
  default_embedding_model:
    type: litellm
    model_provider: openai
    model: embed-gemma-300m-FLM
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    api_base: http://127.0.0.1:13305/api/v1
    retry:
      type: exponential_backoff
      max_retries: 3
      base_delay: 2
      max_delay: 15
    rate_limit:
      type: sliding_window
      requests_per_period: 8
      period_in_seconds: 1

input:
  type: text
  encoding: utf-8

chunking:
  type: tokens
  size: 450
  overlap: 60
  encoding_model: cl100k_base

input_storage:
  type: file
  base_dir: input

output_storage:
  type: file
  base_dir: output_batch10_stable

reporting:
  type: file
  base_dir: logs_batch10_stable

cache:
  type: json
  storage:
    type: file
    base_dir: cache_batch10_stable_4b

vector_store:
  type: lancedb
  db_uri: output_batch10_stable/lancedb
  index_schema:
    text_unit_text:
      index_name: text_unit_text
      vector_size: 768
    entity_description:
      index_name: entity_description
      vector_size: 768
    community_full_content:
      index_name: community_full_content
      vector_size: 768

embed_text:
  embedding_model_id: default_embedding_model
  batch_size: 8
  batch_max_tokens: 6000
  names:
    - text_unit_text
    - entity_description
    - community_full_content

extract_graph:
  completion_model_id: default_completion_model
  prompt: prompts/extract_graph.txt
  entity_types:
    - BIOMEDICAL_ENTITY
    - GENE
    - PROTEIN
    - DISEASE
    - DRUG
    - CHEMICAL
    - VARIANT
    - PHENOTYPE
    - BIOMARKER
    - PATHWAY
    - BIOLOGICAL_PROCESS
    - ORGANISM
  max_gleanings: 0

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: prompts/summarize_descriptions.txt
  max_length: 250

extract_graph_nlp:
  text_analyzer:
    extractor_type: regex_english

cluster_graph:
  max_cluster_size: 10
  seed: 42

extract_claims:
  enabled: false
  completion_model_id: default_completion_model
  prompt: prompts/extract_claims.txt
  description: Biomedical claims and evidence relevant to multi-hop reasoning.
  max_gleanings: 0

community_reports:
  completion_model_id: default_completion_model
  graph_prompt: prompts/community_report_graph.txt
  text_prompt: prompts/community_report_text.txt
  max_length: 600
  max_input_length: 4000

snapshots:
  graphml: true
  embeddings: false
  raw_graph: true

local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: prompts/local_search_system_prompt.txt
  # Empirically safe budget for the custom Lemonade registration; the 12000-token
  # GraphRAG default returned an empty generation in this environment.
  max_context_tokens: 2400
  top_k_entities: 6
  top_k_relationships: 8

global_search:
  completion_model_id: default_completion_model
  map_prompt: prompts/global_search_map_system_prompt.txt
  reduce_prompt: prompts/global_search_reduce_system_prompt.txt
  knowledge_prompt: prompts/global_search_knowledge_system_prompt.txt
  max_context_tokens: 2400

drift_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: prompts/drift_search_system_prompt.txt
  reduce_prompt: prompts/drift_reduce_prompt.txt

basic_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: prompts/basic_search_system_prompt.txt
